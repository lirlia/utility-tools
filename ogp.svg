<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Utility Tools</title>
  <desc id="desc">ブラウザだけで使える開発者向け静的ユーティリティ集</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f2"/>
      <stop offset="0.55" stop-color="#e7f3ef"/>
      <stop offset="1" stop-color="#f8efe2"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14201c" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="70" width="1056" height="490" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="96" y="94" width="1008" height="442" rx="26" fill="#fcfcf9" stroke="#d9ded6" stroke-width="2"/>
  <rect x="138" y="132" width="118" height="118" rx="24" fill="url(#mark)"/>
  <text x="197" y="207" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#ffffff">UT</text>
  <text x="292" y="176" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" fill="#17211f">Utility Tools</text>
  <text x="296" y="232" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#0f766e">ブラウザだけで使える開発者向けツール</text>
  <text x="140" y="322" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#33423e">JSON整形 / JWT解析 / Base64 / QR生成 / 画像変換 / 時刻変換</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <rect x="140" y="390" width="154" height="58" rx="14" fill="#e7f3ef" stroke="#abd6ce"/>
    <text x="217" y="427" text-anchor="middle" fill="#0f766e">Offline</text>
    <rect x="316" y="390" width="186" height="58" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="409" y="427" text-anchor="middle" fill="#9a3412">No upload</text>
    <rect x="524" y="390" width="168" height="58" rx="14" fill="#edf2ff" stroke="#c7d2fe"/>
    <text x="608" y="427" text-anchor="middle" fill="#2563eb">Static</text>
  </g>
  <text x="140" y="506" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#65706c">lirlia.github.io/utility-tools</text>
</svg>
