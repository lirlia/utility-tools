<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown and Mermaid Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
    <h1>Markdown & Mermaid Editor</h1>
    <textarea id="editor" placeholder="Write your Markdown here..."></textarea>
    <div id="output"></div>

    <script>
        const editor = document.getElementById('editor');
        const output = document.getElementById('output');

        editor.addEventListener('input', () => {
            const markdown = editor.value;
            output.innerHTML = marked.parse(markdown);

            document.querySelectorAll('code.language-mermaid').forEach((block) => {
                const parent = block.parentNode;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.innerHTML = block.textContent;
                mermaid.init(undefined, mermaidDiv);
                parent.parentNode.replaceChild(mermaidDiv, parent);
            });
        });
    </script>
</body>
</html>
